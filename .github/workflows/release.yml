name: Release

# Triggered by:
# - push to main: move mobile 'alpha' git tag, no npm publish
# - push tag v*:  publish to npm (@latest) + move 'latest' mobile tag + GitHub Release
#
# Releases are explicit: you have to create and push a tag v<version> to
# publish. Pushing to main only moves the 'alpha' mobile tag so downstream
# consumers can pin to `github:enixCode/light-runner#alpha` for the latest
# main HEAD without waiting for a stable npm release.

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  # Lightweight: just re-point the 'alpha' mobile tag at main HEAD.
  move-alpha:
    if: github.ref_type == 'branch' && github.ref_name == 'main'
    name: Move mobile 'alpha' git tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Move mobile 'alpha' git tag
        run: |
          git tag -f alpha
          git push origin alpha --force

  # Full publish flow on v* tag push.
  release:
    if: github.ref_type == 'tag'
    name: Build + publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create GitHub Release + move 'latest' mobile tag
      id-token: write   # npm provenance + trusted publishing

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 24 ships with npm 11+, required for npm Trusted Publishing (OIDC).
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Compute version from tag
        id: v
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Guard - tag must be a stable version (no pre-release suffix)
        if: contains(steps.v.outputs.version, '-')
        run: |
          echo "Tag ${{ github.ref_name }} contains '-' (pre-release)."
          echo "Only stable tags like v1.2.3 are published to @latest."
          exit 1

      - name: Guard - tag commit must be on main
        run: |
          git fetch origin main --quiet
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag ${{ github.ref_name }} is not reachable from origin/main."
            echo "Merge changes into main first, then create the tag from main."
            exit 1
          fi
          echo "Tag commit is an ancestor of main."

      - name: Sync package.json version with tag
        run: npm version "${{ steps.v.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Unit tests (smoke)
        run: npm run test:build && npm run test:unit

      - name: Check if version already on npm
        id: npm_check
        run: |
          if npm view "light-runner@${{ steps.v.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version already on npm - skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (Trusted Publishing via OIDC)
        # No NODE_AUTH_TOKEN required: npm 11+ uses the `id-token: write`
        # permission above to exchange a GitHub OIDC token for a short-lived
        # npm credential. Configure the trusted publisher at
        # https://www.npmjs.com/package/light-runner/access (once the package
        # exists) or during first publish via `npm access grant`.
        if: steps.npm_check.outputs.exists == 'false'
        run: npm publish --access public --provenance

      - name: Move mobile 'latest' git tag
        if: steps.npm_check.outputs.exists == 'false'
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Create GitHub Release
        if: steps.npm_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
