name: Release

# Only runs on a new version tag push (e.g. v0.8.0, v1.0.0).
# Creates a GitHub Release + publishes the package to npm.
#
# Workflow:
#   npm version patch        # or minor / major - updates package.json + commits + tags
#   git push && git push --tags
#
# Pushing the tag triggers this workflow. Pushing to main alone does nothing.

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build + publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create GitHub Release
      id-token: write   # npm provenance

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Compute version from tag
        id: v
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Guard - tag must be a stable version (no pre-release suffix)
        if: contains(steps.v.outputs.version, '-')
        run: |
          echo "Tag ${{ github.ref_name }} contains '-' (pre-release)."
          echo "Only stable tags like v1.2.3 are published to @latest."
          exit 1

      - name: Guard - tag commit must be on main
        run: |
          git fetch origin main --quiet
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag ${{ github.ref_name }} is not reachable from origin/main."
            echo "Merge changes into main first, then create the tag from main."
            exit 1
          fi
          echo "Tag commit is an ancestor of main."

      - name: Sync package.json version with tag
        run: npm version "${{ steps.v.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Unit tests (smoke)
        run: npm run test:build && npm run test:unit

      - name: Check if version already on npm
        id: npm_check
        run: |
          if npm view "light-runner@${{ steps.v.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version already on npm - skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        if: steps.npm_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
