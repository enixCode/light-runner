name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-unit:
    name: Build + unit tests - Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc strict)
        run: npm run build

      - name: Unit tests (no Docker)
        run: npm run test:build && npm run test:unit

  e2e:
    name: End-to-end tests (Docker)
    runs-on: ubuntu-latest
    needs: build-and-unit

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Docker
        run: docker --version && docker info | grep -E 'Server Version|Operating System'

      - name: Compile src + tests
        run: npm run test:build

      - name: E2E tests
        run: npm run test:e2e
